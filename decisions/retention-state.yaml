# Retention and backup periods across policy documents
# Source: ADR-001-retention-source-of-truth.md
# Updated: 2026-07-05 (line references refreshed after consistency fixes)

definitions:
  backup_retention_period:
    value: 30 days
    source: DPA §1.17
    description: Maximum period for encrypted backup copies after deletion from active systems

  operational_retention_period:
    value: 30 days
    source: DPA §1.18
    description: Server request logs, error monitoring, post-termination Account Data

  subprocessor_notice_period:
    value: 30 days
    source: DPA §1.19
    description: Objection window after Processor notice of new/replacement Subprocessor

document_references:
  toms:
    local_backups:
      value: 7 days
      line: 106
      note: Subset of backup_retention_period; faster recovery tier
    geo_backups_global_elite:
      value: 30 days
      line: 106
      location: AWS S3 (EU: Frankfurt, Ireland)
    backup_retention_period:
      value: 30 days
      line: 110
      refs: DPA §12 (subject to §12.2 exceptions, incl. (c))
    operational_retention_period:
      value: 30 days
      line: 120
      refs: null
    account_data_deletion:
      active: 30 days
      backup: 30 days
      line: 155
      refs: DPA §10

  dpa:
    backup_retention_period:
      value: 30 days
      line: 66
      section: §1.17
      canonical: true
    operational_retention_period:
      value: 30 days
      line: 68
      section: §1.18
      canonical: true
    subprocessor_notice_period:
      value: 30 days
      line: 70
      section: §1.19
      canonical: true
    account_data_post_termination:
      value: Operational Retention Period + Backup Retention Period
      line: 177
      section: §10

  privacy_statement:
    server_request_logs:
      value: up to 30 days
      line: 141
      refs: ToS B.6
    backup_retention:
      value: up to 30 days
      line: 67
      refs: ToS B.6
      note: Secret Content lifecycle sentence; geo-backup exception at line 181
    account_data_deletion:
      active: up to 30 days
      backup: up to 30 days
      line: 232
      refs: ToS J.3
    privacy_response:
      value: 30 days
      extendable: +30 days
      line: 209
    inactive_account_notice:
      value: 30 days
      line: 236
    policy_change_notice:
      value: 30 days
      line: 256
    subprocessor_notice:
      value: 30 days
      line: 117

  tos:
    ip_request_logs:
      value: up to 30 days
      line: 117
      section: B.6
    backup_retention:
      value: up to 30 days
      line: 119
      section: B.6
    account_data_deletion:
      active: within 30 days
      backup: up to 30 days
      line: 424
      section: J.3
    data_export_request:
      value: within 30 days
      line: 430
      section: J.3
    refund_window:
      value: 30 days
      lines: [381, 382, 384]
      section: I.3

exceptions:
  billing_records:
    retention: as required by tax law
    source: Privacy Statement
    note: Not subject to 30-day consolidation

  local_backups:
    retention: 7 days
    source: TOMs line 106
    note: Operational tier within 30-day ceiling

  configuration_documentation:
    retention: service agreement + 5 years post-termination
    source: DPA Schedule B §4 (line 351)
    note: Single-tenant/Global Elite audit records; not subject to 30-day consolidation
