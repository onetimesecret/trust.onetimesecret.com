# The path of a secret. Wording aligned with the Privacy Statement and DPA
# Schedule C: a passphrase is an access-control gate verified before
# decryption — it is NOT part of encryption key derivation.
flow:
  - step: "01"
    title: You paste a secret
    body: It is encrypted in transit over TLS and, on arrival, encrypted at rest with authenticated encryption before it is written anywhere. The key material needed to decrypt is never stored alongside the data — the database tier cannot read what it holds.
  - step: "02"
    title: You get a one-time link
    body: The link points to the encrypted record. We can see that a record exists and when it expires — not what it contains. If you set a passphrase, it must be verified before the secret will decrypt; only a hash of the passphrase is stored, never the passphrase itself.
  - step: "03"
    title: The recipient opens it once
    body: The first successful read returns the secret and destroys the record in the same operation. A second visit finds nothing.
  - step: "04"
    title: Or it expires unread
    body: If no one opens it, the record is purged at expiry. Metadata follows shortly after; encrypted backups age out on a fixed 30-day schedule, in the same regional jurisdiction (for Global Elite deployments, geo-located encrypted backups are stored in AWS S3 in the EU, per DPA §12.2 and Schedule C).
  - step: "05"
    title: Nothing recoverable remains
    body: There is no restore path by design. A leaked link that has already been read is inert — it fails loudly instead of quietly exposing data.

# Seeded from the HECVAT critical-answer library; claims verified against
# the 2026 Privacy Statement, DPA, and TOMs before publication.
faqs:
  - q: Can you read my secrets?
    a: We don't, and the design keeps the possibility narrow. Secret Content is encrypted at rest and the decryption key material is separated from the database tier. We never access, read, scan, categorize, or analyze Secret Content, with four exceptions stated in the Terms — your express prior consent, the direction of your Organization's owner, a support request you make (access limited to what's needed, confidential, and logged), and secrets addressed to us. A passphrase adds a further gate that must be verified before the secret will decrypt.
  - q: What happens if you get a subpoena?
    a: We can only produce what we hold. A secret that has been viewed, expired, or deleted no longer exists — only minimal metadata can be produced. Requests must come from an authority with jurisdiction over the data; for EU-held data that means the GDPR Article 48 route. The full position is in the Privacy Statement's compelled-disclosure section.
  - q: You have no SOC 2. Why should we trust you?
    a: Because you do not have to trust us as much. The product minimizes what our procedures can affect, the code has been open source since 2012, and our HECVAT and DPA answer what a questionnaire asks. See Assurance for the full position.
  - q: What if a subprocessor changes?
    a: Every account holder is emailed before a new or replacement subprocessor processes any data, with a thirty-day objection window. Object and you may terminate the affected services without penalty. In an emergency — a provider failing — we may engage a replacement first and notify promptly after, with the objection window running from that notice. The dated history is public on the Subprocessors page; the canonical list is DPA Schedule A.
  - q: Can we avoid subprocessors entirely?
    a: Yes. Self-hosted installations run on your own infrastructure with zero subprocessors — nothing in the chain but you. The same open-source code runs both our hosted service and your deployment.
  - q: Who actually answers when we email?
    a: A person, usually the one who wrote the code, within five business days. Not a ticketing portal, not a compliance chatbot.

auditMappings:
  - framework: SOC 2
    control: CC6.1 / CC6.7
    how: Restricts logical access to transmitted credentials; sensitive values are not persisted in email or chat systems.
  - framework: ISO 27001
    control: A.5.14 — information transfer
    how: A documented secure-transfer mechanism for sensitive information between parties.
  - framework: ISO 27001
    control: A.5.17 — authentication info
    how: Controlled distribution of authentication information; single retrieval with automatic destruction.
  - framework: HECVAT
    control: Data handling
    how: Demonstrates a defined process for credential exchange with third parties and vendors.
  - framework: GDPR
    control: Art. 32 — security of processing
    how: Encryption and data minimization as technical measures; sensitive data not retained in communication logs.
