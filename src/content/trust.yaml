# trust.onetimesecret.com — single source of truth.
# Every page is a pure render of this file, validated by src/lib/trust-config.ts.
# Published verbatim at /trust.yaml so procurement tooling diffs a stable file.
#
# DPA Schedule A's tables are RENDERED from the subprocessors block below
# (src/components/ScheduleA.astro) — the contractual list and this file are
# the same data. This file supplements — never replaces — the email notice
# required by DPA §6.1.

meta:
  name: Onetime Secret
  updatedAt: "2026-07-05"
  contacts:
    email: security@onetimesecret.com
    sla: "5 business days"
    pgp: /pgp-key.asc

# The regional multi-tenant deployments (ToS/Privacy Policy "Regional
# Domains"). Each subprocessor service below declares which of these it
# serves via `regions`: a list of codes, or `global` for pan-region
# services engaged regardless of where the data lives (e.g. Proton, Stripe).
regions:
  - { code: eu, label: European Union, domain: eu.onetimesecret.com }
  - { code: uk, label: United Kingdom, domain: uk.onetimesecret.com }
  - { code: ca, label: Canada, domain: ca.onetimesecret.com }
  - { code: us, label: United States, domain: us.onetimesecret.com }
  - { code: nz, label: Aotearoa New Zealand, domain: nz.onetimesecret.com }

# The canonical subprocessor list. DPA Schedule A's tables are RENDERED
# from these entries (services = category-table rows, entity = the entity
# details table) and the trust site's Subprocessors page derives its
# summaries from the same data — the contractual list and this file
# cannot drift because they are the same data.
# `engagement` (default `active`) is a separate axis: `standby` marks a
# vetted, contractually approved provider that processes nothing in the
# standard service yet. Bespoke-only providers are also plain `standby`,
# deliberately unlabeled — the page's "Bespoke & custom installations"
# notice covers them.
# `operational: true` is a third, independent axis: the provider runs our own
# operations (company/support email, internal infra) rather than the customer
# secret flow. Operational entries stay in Schedule A when they process
# personal data (Proton support mail) or are pre-approved hosts (Northflank),
# but are kept OUT of the region diagram and grouped into the Subprocessors
# page's "used internally" section. Providers that process NO Company Personal
# Data at all are not subprocessors — they live in `internalTools` below.
# Standby and operational entries are both kept out of the region diagram.
# Per-service `status` (standby | transitioning) covers a single service of
# an otherwise active vendor: `standby` = approved-only (BunnyCDN storage),
# `transitioning` = engagement being phased in or out (Approximated, while
# custom-domain TLS moves to our own cert manager) — rendered dashed.
# Topology confirmed 2026-07-18: Lettermint sends EU+UK mail; AWS SES sends
# US mail from us-west-1 and CA+NZ mail from ca-central-1; Hetzner US backs
# up to US only; DigitalOcean CA data stays in Toronto; UpCloud UK data
# stays in London.
# UpCloud (uk), DigitalOcean (ca), Catalyst (nz) MUST stay `active` while
# their regions are live: each is the sole host for its region.
# TODO(release): confirm `since` dates against infra/billing history
# (Handoff Spec §7.2) before publishing.
# TODO(counsel): DPA §12.2 does not yet enumerate two mail flows that leave
