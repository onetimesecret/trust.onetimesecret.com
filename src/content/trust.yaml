# an NZ IPP 12 analysis, and is a candidate for moving providers anyway).
# §12.1's residency promise needs both enumerated — same treatment as the
# Sentry flow (§12.2(e)). Update ADR-002's inventory too.
# TODO(release): confirm Hetzner US backup location (Oregon assumed, matching
